version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: burger-palace-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: burger_admin
      POSTGRES_PASSWORD: burger_password
      POSTGRES_DB: burger_palace
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U burger_admin -d burger_palace"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local

